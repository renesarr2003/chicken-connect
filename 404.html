<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Page introuvable</title>
    <meta http-equiv="refresh" content="0;url=/chicken-connect/#/" />
    <script>
      // Redirect to the SPA entrypoint using hash routing (preserves deep links)
      const base = "/chicken-connect";
      const path = window.location.pathname.replace(new RegExp(`^${base}`), "") || "/";
      const search = window.location.search || "";
      const hash = window.location.hash || "";
      const target = `${base}/#${path}${search}${hash}`;
      window.location.replace(target);
    </script>
  </head>
  <body>
    <p>Redirection en cours…</p>
  </body>
</html>
